name: Deploy Preview

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to deploy
        required: true
        type: number

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@v7
        env:
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
        with:
          script: |
            const pullNumber = context.eventName === 'workflow_dispatch'
              ? Number(process.env.PR_NUMBER_INPUT)
              : context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
            });

            if (pr.state !== 'open') {
              core.setFailed(`PR #${pullNumber} is ${pr.state}`);
              return;
            }

            core.setOutput('number', String(pr.number));
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Deploy Netlify preview
        id: preview
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            OUTPUT=$(npx --yes netlify-cli@25.6.0 deploy --dir=public --json)
          else
            set +e
            OUTPUT=$(npx --yes netlify-cli@25.6.0 deploy --dir=public --json --allow-anonymous 2>&1)
            set -e
          fi

          DEPLOY_URL=$(OUTPUT="$OUTPUT" node <<'NODE'
          const output = process.env.OUTPUT || "";
          const jsonStart = output.lastIndexOf("{");
          const jsonEnd = output.lastIndexOf("}");

          if (jsonStart === -1 || jsonEnd === -1 || jsonEnd < jsonStart) {
            process.exit(0);
          }

          try {
            const parsed = JSON.parse(output.slice(jsonStart, jsonEnd + 1));
            console.log(parsed.deploy_url || parsed.url || parsed.ssl_url || parsed.site_url || "");
          } catch {
            process.exit(0);
          }
          NODE
          )

          if [ -z "$DEPLOY_URL" ]; then
            echo "$OUTPUT"
            exit 1
          fi
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Register preview deployment
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.preview.outputs.deploy_url }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.HEAD_SHA,
              environment: `preview/pr-${{ steps.pr.outputs.number }}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: process.env.DEPLOY_URL,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Update PR description with preview links
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.preview.outputs.deploy_url }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const previewUrl = new URL(process.env.DEPLOY_URL);
            const cases = [
              {
                title: 'Mixed VAT + long total row',
                note: 'Long item names, item notes, custom columns, and a wide sum row.',
                data: 'N4IgjCBcIGoIIBUQBoQFYoG1QDYogGUBpAVRRAHYoAXAJwFcBTVAL3wGcBrekAX2Vz4ACgAsAhu0bkqkOk1b4ADuMl8AuqjH5GAO3IAjfAE0TRgLQBZC2YAiN8gGN8AURIAlcgBN8nxgDMxegAbanI-',
              },
              {
                title: 'Stripe template + pay online',
                note: 'Stripe layout, USD formatting, pay-online URL, and buyer notes.',
                data: 'N4IgjCBcIGoIIBUQBoQEMogKYDsUgCNMBZU4gAgBFlyBNe2-AY0wFUBlS-AE0wGcALgCcAlgAcs+AGZRQAD0wBJHADcA9iKaTUAT0zsEAJUUAFAKIBaACwAmWyAC+qAOaYbABhsA2C+6sWbAFZ8AAs3Tx8--PxAAB1IcAA0oEAxgvhJH4AC0-wApwWyHDtoHwbtIE5PcByHEd6iaTo1HNKQ+jUbpBDQAgRD6EQAC80AEEQ1DwVB12gplNzQ1Ad0w3t9ygB4TzPC8r3wO92J+B9IBsCYXzfCCvx-Q8vAeQCQIk1BwI-VAoJjEB4MgbFVIcABdVA8EgS4nkmVByg0kAxEwQ4zV4VAyyHYZoA8bxfECXxI0zTAWjaDpuikEQ5AEdJWnIZxcCGBisBVAgdHIQ5FGrVB2XslQh06Ic+AvAQBDEPhIAAenKpgQiwJhslzAQIUEUQJAhN05iq8qxDQHQqr4AB9aFBH6sRWnaLpHCAA',
              },
              {
                title: 'German locale + CHF formatting',
                note: 'Localized labels, date format, currency formatting, and custom tax label.',
                data: '-aGG7zS4Uaw+ewUI5mCDoB5PUmvaC5BV4X7-',
              },
              {
                title: 'Slovak locale smoke',
                note: 'PR #8 language path with Slovak labels, EUR, and DPH tax wording.',
                data: '-gCtfgGSAmSy0GyOahPlAANqgUyOkDHTD4dzB0OoABScZFIGNowAXmJxGgGOEdTh8kIVOoi6M5cJ8gB3cpqHACUTlevM1D6OMAGUTqHIKfZqDVUHcqFFcbgmF8lXwAEU45xIBDULo400oGZUKw4wA1MezUyoADqcepkFhFlQ9EgSQJIAAWlAvLaHDG4wnGahk5BWcOQAzO8blKTB2HKBhxnyUQzT4UZiwmZg0CwLQ4BgBR8h7cJ6nwbtgIfPtvxAQc-xDADRxXCcp0wHAsAXJcx1hWE1w3LdjxAXd8NuA9IHcJjT3PKAmNIWYbzjZ9IC8eERLsABdVBRigBYEXcETUHKONvkwfo0FGHBymqLR8m+NQ+GqOdUAARzjNQAjcUwvGsWF-T0NtajLNsGBDHUTLMkt63LcJZBif4gy41Bqjjes6TsIA',
              },
              {
                title: 'Shared link without QR payload',
                note: 'No QR data, for checking that local QR state does not leak into shared invoices.',
                data: 'N4IgjCBcIGoIIBUQBoQEMogKYDsUgCNMARYgegFkKyBNOm-AY0wHEAhABXwBNNusAZmgCuAGwAu+AVFAAPTAEkcANwD2AS0ZZ8AT0wA5APIBaAIoAlYwoDKhgDKIFh-SAC+qAOaYATAAZvAGzGvgAsxt4ArPgAFj7+QaHhUajqiioaWvgAVlDiAE7CWKgA1jIg3pjwCAAE+qr4cJgAomgAzjocxABi1Rx5WMrqWADu1dZYoqJYefhsmGC+vtVNsmgAtgAOU2P5WFjiADo4cGut4tPc6-gAwgZ2YN4AzCERAQDsABwAnGy+EKjEXIFIogJqYVoTKZ5AACWFWmymADpzmd8F07l8wHA2Po4KEwG8wAEQo9FvgWEDCqgABKYbG4-R2byNVAKSkgyTQfDCKBCUQQ9wgURlCrQKq1eqoRrQPoDIajNjCHTTap2cS8VBzaB+JbXYRnVRrFVwZS4QpHNjTUTqPCoW7QYhNL4fN4BCIk7z-',
              },
            ];

            const linkLines = cases.map((testCase) => {
              const url = new URL(previewUrl.toString());
              url.searchParams.set('data', testCase.data);
              return `- [${testCase.title}](${url.toString()}) - ${testCase.note}`;
            });

            const marker = '<!-- deploy-preview -->';
            const previewBlock = [
              marker,
              '---',
              `**Deploy Preview:** ${previewUrl.toString()}`,
              '',
              '**Prefilled test links:**',
              ...linkLines,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
            });

            let body = pr.body || '';

            if (body.includes(marker)) {
              body = body.replace(new RegExp(`${marker}[\\s\\S]*$`), previewBlock);
            } else {
              body = body.trimEnd() + '\n\n' + previewBlock;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
              body,
            });
